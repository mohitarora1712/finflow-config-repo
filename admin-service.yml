server:
  port: 8084

spring:
  application:
    name: admin-service

  cloud:
    openfeign:
      httpclient:
        hc5:
          enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

resilience4j:
  circuitbreaker:
    instances:

      applicationService:
        failureRateThreshold: 50
        slidingWindowSize: 10
        minimumNumberOfCalls: 5

      documentService:
        failureRateThreshold: 50
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
