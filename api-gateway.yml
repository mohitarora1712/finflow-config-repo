server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1

            - id: application-service
              uri: lb://APPLICATION-SERVICE
              predicates:
                - Path=/applications/**
              filters:
                - StripPrefix=1

            - id: document-service
              uri: lb://DOCUMENT-SERVICE
              predicates:
                - Path=/documents/**
              filters:
                - StripPrefix=1

            - id: admin-service
              uri: lb://ADMIN-SERVICE
              predicates:
                - Path=/admin/**
              filters:
                - StripPrefix=1

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    urls:
      - name: AUTH
        url: /auth/v3/api-docs
      - name: APPLICATION
        url: /applications/v3/api-docs
      - name: DOCUMENT
        url: /documents/v3/api-docs
      - name: ADMIN
        url: /admin/v3/api-docs

jwt:
  secret: myverysecuresecretkeymyverysecuresecretkey

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
