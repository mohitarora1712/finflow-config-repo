server:
  port: 8082

spring:
  application:
    name: application-service

  datasource:
    url: jdbc:postgresql://localhost:5432/application-service_db
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  redis:
    host: localhost
    port: 6379

  rabbitmq:
    host: localhost
    port: 5672

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
