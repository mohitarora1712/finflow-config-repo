server:
  port: 8082

spring:
  application:
    name: application-service

  datasource:
    url: jdbc:postgresql://localhost:5433/application_service_db
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  redis:
    host: localhost
    port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    connection-timeout: 5s

logging:
  level:
    org.hibernate.SQL: debug

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
